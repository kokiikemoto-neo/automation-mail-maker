<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    :root { --blue:#2563eb; --green:#16a34a; --gray:#6b7280; --line:#e5e7eb; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
           margin: 0; background: #f6f7f9; color: #1f2937; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 20px 16px 60px; }
    h1 { font-size: 20px; margin: 8px 0 4px; }
    .sub { color: var(--gray); font-size: 13px; margin-bottom: 20px; }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 12px 0 4px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; font-family: inherit; }
    textarea { min-height: 120px; resize: vertical; line-height: 1.7; }
    .row { display: flex; gap: 12px; }
    .row > div { flex: 1; }
    button { border: 0; border-radius: 8px; padding: 11px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-blue { background: var(--blue); color: #fff; }
    .btn-green { background: var(--green); color: #fff; width: 100%; padding: 14px; font-size: 15px; }
    .btn-ghost { background: #fff; border: 1px solid var(--line); color: #374151; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .actions { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
    .count { font-size: 12px; color: var(--gray); }
    .msg { font-size: 13px; padding: 8px 10px; border-radius: 8px; margin-top: 10px; display: none; }
    .msg.ok { background: #ecfdf5; color: #065f46; display: block; }
    .msg.err { background: #fef2f2; color: #991b1b; display: block; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--line); }
    th { color: var(--gray); font-weight: 600; }
    .pill { font-size: 12px; padding: 2px 8px; border-radius: 999px; }
    .s-待ち { background: #fef9c3; color: #854d0e; }
    .s-処理中 { background: #dbeafe; color: #1e40af; }
    .s-完了 { background: #dcfce7; color: #166534; }
    .s-エラー { background: #fee2e2; color: #991b1b; }
    .spin { display:inline-block; width:14px; height:14px; border:2px solid #fff; border-top-color:transparent;
            border-radius:50%; animation: sp .7s linear infinite; vertical-align:-2px; margin-right:6px; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .tabs { display:flex; gap:8px; margin:14px 0 10px; }
    .tab { flex:1; background:#f1f5f9; color:#475569; border:1px solid var(--line); border-radius:8px; padding:9px; font-weight:600; font-size:13px; cursor:pointer; }
    .tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>✍️ 便箋作成ツール</h1>
    <div class="sub">議事録（ファイル）から原稿を作り、「便箋作成」を押すと、ロボットPCの順番待ちに入ります。</div>

    <div class="card">
      <div class="row">
        <div>
          <label>担当者</label>
          <input id="staff" placeholder="例：池本">
        </div>
        <div>
          <label>会社名 <span style="color:#dc2626">*</span></label>
          <input id="company" list="company-list" placeholder="例：株式会社サンプル">
          <datalist id="company-list"></datalist>
        </div>
      </div>

      <label>宛名（氏名。会社単独なら空欄でOK）</label>
      <input id="recipient" placeholder="例：採用ご担当者 / 山田太郎">

      <label>議事録ファイルをPCから添付</label>
      <input type="file" id="minutesFile"
             accept=".txt,.md,.csv,.pdf,.png,.jpg,.jpeg,.webp,.gif,.mp3,.wav,.m4a,.aac,.ogg,.flac,.mp4,.mov,.webm,.m4v,.mpeg"
             onchange="onFilePicked()">
      <div class="count" id="fileInfo"></div>

      <label>または Google ドライブから取り込み（共有URL か ファイルID）</label>
      <input id="driveRef" placeholder="例：https://drive.google.com/file/d/xxxx/view">

      <div class="actions">
        <button class="btn-blue" id="genMin" onclick="onGenerateFromMinutes()">原稿を生成</button>
        <span class="count">議事録（テキスト/PDF/画像/音声/動画）と過去の経緯から手書き原稿を作ります</span>
      </div>
    </div>

    <div class="card">
      <label>文面（手書きする本文・編集できます）</label>
      <textarea id="message" placeholder="ここに文面が入ります。手で書き直してもOK。" oninput="updateCount()"></textarea>
      <div class="count" id="charCount">0 文字</div>

      <div style="margin-top:14px">
        <button class="btn-green" id="create" onclick="onCreate()">便箋作成（順番待ちに入れる）</button>
      </div>
      <div class="msg" id="result"></div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <strong style="font-size:14px">最近の注文</strong>
        <button class="btn-ghost" onclick="loadOrders()">更新</button>
      </div>
      <table style="margin-top:10px">
        <thead><tr><th>受付</th><th>会社</th><th>担当</th><th>状況</th></tr></thead>
        <tbody id="orders"><tr><td colspan="4" class="count">読み込み中…</td></tr></tbody>
      </table>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <strong style="font-size:14px">🤖 ロボット操作</strong>
        <span class="count" id="robotState">状態：—</span>
      </div>
      <div class="actions" style="margin-top:12px; flex-wrap:wrap">
        <button class="btn-ghost" onclick="robotControl('一時停止')">一時停止</button>
        <button class="btn-ghost" onclick="robotControl('再開')">再開</button>
        <button class="btn-ghost" style="color:#b91c1c; border-color:#fecaca" onclick="robotControl('中止')">いまの1通を中止</button>
      </div>
      <div class="count" style="margin-top:8px">
        一時停止＝今の動きを止める／再開＝続きから/ 中止＝今書いている1通をやめて次へ進む
      </div>
    </div>
  </div>

<script>
  function updateCount() {
    var n = document.getElementById('message').value.length;
    document.getElementById('charCount').textContent = n + ' 文字';
  }

  function showResult(ok, text) {
    var el = document.getElementById('result');
    el.className = 'msg ' + (ok ? 'ok' : 'err');
    el.textContent = text;
  }

  function onFilePicked() {
    var f = document.getElementById('minutesFile').files[0];
    document.getElementById('fileInfo').textContent =
      f ? ('添付: ' + f.name + '（' + Math.round(f.size / 1024) + ' KB）') : '';
  }

  function onGenerateFromMinutes() {
    var fileEl = document.getElementById('minutesFile');
    var hasFile = fileEl.files && fileEl.files.length > 0;
    var driveRef = document.getElementById('driveRef').value.trim();
    if (!hasFile && !driveRef) { showResult(false, '議事録ファイルを添付するか、ドライブのURL/IDを入れてください'); return; }

    var btn = document.getElementById('genMin');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>生成中…';
    function done() { btn.disabled = false; btn.textContent = '原稿を生成'; }

    function callServer(filePayload) {
      google.script.run
        .withSuccessHandler(function (r) {
          done();
          if (r.ok) { document.getElementById('message').value = r.message; updateCount(); showResult(true, '原稿を生成しました。必要なら編集してください。'); }
          else { showResult(false, r.error); }
        })
        .withFailureHandler(function (e) { done(); showResult(false, '通信エラー: ' + e.message); })
        .generateDraftFromMinutes({
          company: document.getElementById('company').value,
          recipient: document.getElementById('recipient').value,
          file: filePayload,
          driveRef: driveRef
        });
    }

    if (hasFile) {
      var f = fileEl.files[0];
      if (f.size > 18 * 1024 * 1024) { done(); showResult(false, 'ファイルが大きすぎます（18MBまで）。大きい動画はドライブ取り込みでも18MB制限です。短い素材にしてください。'); return; }
      var reader = new FileReader();
      reader.onload = function () {
        var base64 = reader.result.split(',')[1]; // dataURL の "base64," 以降
        callServer({ name: f.name, mimeType: f.type || 'application/octet-stream', dataBase64: base64 });
      };
      reader.onerror = function () { done(); showResult(false, 'ファイルの読み込みに失敗しました'); };
      reader.readAsDataURL(f);
    } else {
      callServer(null);  // ドライブ取り込みのみ
    }
  }

  function robotControl(action) {
    if (action === '中止' && !confirm('いま書いている便箋を中止して次へ進みます。よろしいですか？')) return;
    google.script.run
      .withSuccessHandler(function (r) {
        if (r && r.ok) showResult(true, 'ロボットに「' + action + '」を送りました。');
        else showResult(false, (r && r.error) || '操作に失敗しました');
        loadRobotState();
      })
      .withFailureHandler(function (e) { showResult(false, '通信エラー: ' + e.message); })
      .setControl(action);
  }

  function loadRobotState() {
    google.script.run.withSuccessHandler(function (r) {
      var el = document.getElementById('robotState');
      if (!r || !r.ok) { el.textContent = '状態：—'; return; }
      var s = '状態：' + r.status;
      if (r.current) s += '（' + r.current + '）';
      if (r.updated) s += ' / ' + r.updated;
      el.textContent = s;
    }).getRobotState();
  }

  function onCreate() {
    var company = document.getElementById('company').value.trim();
    var message = document.getElementById('message').value.trim();
    if (!company) { showResult(false, '会社名を入力してください'); return; }
    if (!message) { showResult(false, '文面が空です'); return; }
    var btn = document.getElementById('create');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span>登録中…';
    google.script.run
      .withSuccessHandler(function (r) {
        btn.disabled = false; btn.textContent = '便箋作成（順番待ちに入れる）';
        if (r.ok) {
          showResult(true, '受け付けました（' + r.id + '）。ロボットPCが順番に書き出します。');
          document.getElementById('message').value = '';
          updateCount();
          loadOrders();
        } else { showResult(false, r.error); }
      })
      .withFailureHandler(function (e) {
        btn.disabled = false; btn.textContent = '便箋作成（順番待ちに入れる）';
        showResult(false, '通信エラー: ' + e.message);
      })
      .createOrder({
        staff: document.getElementById('staff').value,
        company: company,
        recipient: document.getElementById('recipient').value,
        message: message
      });
  }

  function loadOrders() {
    google.script.run.withSuccessHandler(function (r) {
      var tb = document.getElementById('orders');
      if (!r.ok || !r.rows.length) { tb.innerHTML = '<tr><td colspan="4" class="count">まだ注文はありません</td></tr>'; return; }
      tb.innerHTML = r.rows.map(function (o) {
        return '<tr><td>' + o.received + '</td><td>' + esc(o.company) + '</td><td>' + esc(o.staff || '') +
               '</td><td><span class="pill s-' + o.status + '">' + o.status + '</span></td></tr>';
      }).join('');
    }).getOrders(15);
  }

  function loadCompanies() {
    google.script.run.withSuccessHandler(function (r) {
      if (!r.ok || !r.companies.length) return;
      document.getElementById('company-list').innerHTML =
        r.companies.map(function (c) { return '<option value="' + esc(c) + '">'; }).join('');
    }).getCompanies();
  }

  function esc(s) { return ('' + s).replace(/[&<>"]/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

  loadOrders();
  loadCompanies();
  loadRobotState();
  setInterval(loadRobotState, 5000);
</script>
</body>
</html>
